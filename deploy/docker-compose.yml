services:
  market-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - market-monitor:latest
    container_name: market-monitor-and-buyer
    image: market-monitor:latest
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./logs:/app/logs
      - ./stock_data:/app/stock_data
      # 配置文件
      - ./.streamlit:/app/.streamlit
      - ./.secret.key:/app/.secret.key
      # 策略队列和关注列表
      - ./strategy_queue.json:/app/strategy_queue.json
      - ./watchlist.json:/app/watchlist.json
      # 核心数据和配置持久化
      - ./user_data.db:/app/user_data.db
      - ./trading.db:/app/trading.db
      - ./strategies.db:/app/strategies.db
      - ./user_config.json:/app/user_config.json
      - ./prompts_encrypted.json:/app/prompts_encrypted.json
      - ./prompts:/app/prompts
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: market-network
